name: Lean CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  verify:
    name: Verify Lean proofs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lean-action
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build: true

      - name: Verify AIAssurance.lean
        run: lake env lean AIAssurance.lean
