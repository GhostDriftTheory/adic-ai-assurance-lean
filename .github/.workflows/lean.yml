name: Lean CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  verify:
    name: Verify Lean proofs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Install Lean toolchain from lean-toolchain
        run: |
          elan toolchain install $(cat lean-toolchain)
          elan override set $(cat lean-toolchain)

      - name: Cache elan toolchains
        uses: actions/cache@v4
        with:
          path: ~/.elan/toolchains
          key: ${{ runner.os }}-elan-${{ hashFiles('lean-toolchain') }}

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: .lake/packages
          key: ${{ runner.os }}-lake-${{ hashFiles('lakefile.toml') }}
          restore-keys: |
            ${{ runner.os }}-lake-

      - name: Resolve dependencies
        run: lake update

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Verify AIAssurance.lean
        run: lake env lean AIAssurance.lean
